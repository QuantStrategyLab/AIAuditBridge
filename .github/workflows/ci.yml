name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Actionlint
        uses: docker://rhysd/actionlint:1.7.12

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whitespace
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Python lint and tests
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest ruff
          python3 -m pip check
          python3 -m ruff check .
          python3 -m pytest tests ops/quant-monitor/tests -q

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run Cloudflare Worker tests
        run: |
          set -euo pipefail
          node --experimental-default-type=module --test cloudflare/codex-audit-proxy/tests/index.test.mjs
          node --experimental-default-type=module --test cloudflare/ai-gateway-dash/tests/index.test.mjs
