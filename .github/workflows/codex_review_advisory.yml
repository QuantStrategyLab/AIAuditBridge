name: Codex Review Advisory

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: codex-review-advisory-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  advisory:
    if: github.event.review.user.login == 'chatgpt-codex-connector[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Report current-head Codex advisory
        run: python scripts/report_codex_app_review.py
