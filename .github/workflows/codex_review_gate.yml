name: Codex Review Gate

# Static gate plus advisory observer for the Codex GitHub App
# (chatgpt-codex-connector):
#
# 1. PR mode (PR opened/synchronized):
#    Runs the blocking static security guard, then observes any current-head
#    connector review without polling.
#
# 2. REACT mode (Codex submits review):
#    Reports the advisory review immediately. Connector verdicts never block;
#    the repository-owned Codex PR Review workflow is the AI merge gate.
#
# No API keys needed — reads the App's review via GitHub API.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  workflow_call:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: codex-review-gate-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  gate:
    if: >
      github.event_name == 'pull_request_review'
      && github.event.review.user.login == 'chatgpt-codex-connector[bot]'
      || github.event_name == 'pull_request'
      && github.event.pull_request.draft == false

    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Evaluate Codex Review Gate
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/gate_codex_app_review.py

      - name: Upload gate diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-review-gate-${{ github.event.pull_request.number || github.run_id }}
          path: data/output/codex_review_gate/
          if-no-files-found: warn
